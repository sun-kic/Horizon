name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 8 * * *'  # Runs daily at 08:00 UTC (16:00 北京时间)
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 48

      - name: Generate index
        run: |
          python3 << 'PYEOF'
          import urllib.request, json

          tree_url = "https://api.github.com/repos/sun-kic/Horizon/git/trees/gh-pages?recursive=1"
          req = urllib.request.Request(tree_url, headers={"Accept": "application/vnd.github.v3+json"})
          with urllib.request.urlopen(req) as resp:
              tree_data = json.loads(resp.read())

          posts = []
          for item in tree_data.get('tree', []):
              path = item['path']
              if path.startswith('_posts/') and path.endswith('.md') and '-zh' in path:
                  posts.append(path)
          posts.sort(reverse=True)

          lines = [
              "---",
              "layout: default",
              "title: Horizon Daily",
              "---",
              "",
              "# Horizon",
              "",
              "欢迎来到 [Horizon](https://github.com/thysrael/Horizon)，一个 AI 驱动的信息聚合系统。",
              "",
              "## 文档",
              "",
              "- [配置指南](configuration) — AI 提供商、信息源、过滤规则与环境变量替换",
              "- [信息源采集器](scrapers) — Horizon 如何从 GitHub、Hacker News、RSS、Reddit 采集内容",
              "- [评分系统](scoring) — 基于 AI 的内容分析与 0-10 评分体系",
              "",
              "## 每日简报",
              "",
              "- [中文简报 (feed-zh.xml)](feed-zh.xml)",
              "- [英文简报 (feed-en.xml)](feed-en.xml)",
              "",
              "### 最新内容",
              "",
          ]
          for post in posts[:15]:
              date = post.split('/')[1].split('-')[0:3]
              date_str = '-'.join(date)
              lines.append(f"- [{date_str} 中文简报]({post})")

          lines.extend([
              "",
              '<style>',
              '.rss-icon { display: inline-block; width: 16px; height: 16px; vertical-align: middle; }',
              '</style>',
          ])

          with open('index.md', 'w') as f:
              f.write('\n'.join(lines))
          print(f"Generated index with {len(posts)} posts")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4